<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter Your Name</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/input.css">
</head>

<body>
    <div class="container">
        <p class="title">ENTER YOUR NAME</p>

        <input type="text" id="playerName" maxlength="15" placeholder="Your Name" />

        <div class="button-group">
            <button id="startBtn" onclick="goNext()">START</button>
        </div>
    </div>

    <script>
        let nameInput = document.getElementById('playerName');
        let startBtn = document.getElementById('startBtn');

        startBtn.disabled = true;

        nameInput.addEventListener('input', function () {
            startBtn.disabled = nameInput.value.trim().length === 0;
        });

        nameInput.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') goNext();
        });

        function goNext() {
            let playerName = nameInput.value.trim();
            if (playerName.length === 0) return;
            localStorage.setItem('playerName', playerName);
            window.location.href = 'difficulty.html'; // → difficulty picker
        }

        nameInput.focus();
    </script>
</body>

</html>
