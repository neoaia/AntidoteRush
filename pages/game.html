<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antidote Rush - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: pixelated;
        }

        #fade-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #fade-overlay.transparent {
            opacity: 0;
        }
    </style>
</head>

<body>

    <div id="fade-overlay"></div>

    <script src="../libraries/p5.min.js"></script>

    <!-- ── Load order matters: utilities first, then systems, then game ── -->

    <!-- 1. Pause clock — everything depends on this -->
    <script src="../js/utils/pauseClock.js"></script>

    <!-- 2. NEW: Object pool (must be before gameState) -->
    <script src="../js/utils/objectPool.js"></script>

    <!-- 3. NEW: HUD cache (must be before uiRenderer) -->
    <script src="../js/utils/hudCache.js"></script>

    <!-- 4. Utility files -->
    <script src="../js/utils/collisionHelper.js"></script>
    <script src="../js/utils/inputHandler.js"></script>
    <script src="../js/utils/uiRenderer.js"></script>
    <script src="../js/utils/gameRenderer.js"></script>

    <!-- 5. Entity files -->
    <script src="../js/entities/antidote.js"></script>
    <script src="../js/entities/base.js"></script>
    <script src="../js/entities/bullet.js"></script>
    <script src="../js/entities/obstacle.js"></script>
    <script src="../js/entities/player.js"></script>
    <script src="../js/entities/witchProjectile.js"></script>
    <script src="../js/entities/zombie.js"></script>
    <script src="../js/entities/weapon.js"></script>

    <!-- 6. System files -->
    <script src="../js/systems/assetManager.js"></script>
    <script src="../js/systems/antidoteManager.js"></script>
    <script src="../js/systems/combatManager.js"></script>
    <script src="../js/systems/gameState.js"></script>
    <script src="../js/systems/mapManager.js"></script>
    <script src="../js/systems/roundManager.js"></script>
    <script src="../js/systems/zombieManager.js"></script>
    <script src="../js/systems/weaponManager.js"></script>
    <script src="../js/systems/shopManager.js"></script>
    <script src="../js/systems/spriteManager.js"></script>
    <script src="../js/systems/audioManager.js"></script>
    <script src="../js/systems/bgmManager.js"></script>

    <!-- 7. Optional: Supabase client (comment out if not using) -->
    <!-- <script src="../js/systems/supabaseClient.js"></script> -->

    <!-- 8. Main game — must be last -->
    <script src="../js/game.js"></script>

    <script>
        window.addEventListener('load', function () {
            const fadeOverlay = document.getElementById('fade-overlay');
            setTimeout(function () {
                fadeOverlay.classList.add('transparent');
            }, 100);
        });

        window.fadeNavigateTo = function (url) {
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('transparent');
            fadeOverlay.addEventListener('transitionend', function handler() {
                fadeOverlay.removeEventListener('transitionend', handler);
                window.location.href = url;
            });
        };
    </script>

</body>

</html>
