<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Over</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 20px;
            overflow: hidden;
        }

        /* ── Fade transition overlay ── */
        #fade-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.45s ease;
        }

        #fade-overlay.transparent {
            opacity: 0;
        }

        /* ── Content ── */
        #content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #content.visible {
            opacity: 1;
        }

        h1 {
            font-size: 40px;
            color: #ff2222;
            text-shadow: 0 0 40px #ff222288;
            letter-spacing: 6px;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            85% {
                opacity: 0.6;
            }

            90% {
                opacity: 1;
            }

            95% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        .stats-box {
            background: #161622;
            border: 2px solid #333355;
            border-radius: 6px;
            padding: 28px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 340px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .stat-label {
            font-size: 9px;
            color: #888;
        }

        .stat-value {
            font-size: 13px;
            color: #ffdc50;
        }

        .stat-row.player-name .stat-value {
            color: #aaddff;
        }

        .stat-row.round .stat-value {
            color: #88ff88;
        }

        .buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 14px 24px;
            border: 2px solid;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            background: #111;
        }

        button:hover {
            transform: translateY(-3px);
        }

        #btn-play-again {
            color: #88ff88;
            border-color: #88ff88;
        }

        #btn-play-again:hover {
            box-shadow: 0 0 16px #88ff8866;
        }

        #btn-title {
            color: #aaa;
            border-color: #555;
        }

        #btn-title:hover {
            box-shadow: 0 0 16px #aaaaaa44;
        }
    </style>
</head>

<body>

    <!-- Fade transition overlay -->
    <div id="fade-overlay"></div>

    <div id="content">
        <h1>GAME OVER</h1>

        <div class="stats-box">
            <div class="stat-row player-name">
                <span class="stat-label">PLAYER</span>
                <span class="stat-value" id="display-name">—</span>
            </div>
            <div class="stat-row round">
                <span class="stat-label">ROUND REACHED</span>
                <span class="stat-value" id="display-round">—</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">FINAL SCORE</span>
                <span class="stat-value" id="display-score">—</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">COINS EARNED</span>
                <span class="stat-value" id="display-coins">—</span>
            </div>
        </div>

        <div class="buttons">
            <button id="btn-play-again" onclick="playAgain()">PLAY AGAIN</button>
            <button id="btn-title" onclick="goTitle()">TITLE SCREEN</button>
        </div>
    </div>

    <script>
        // ── Populate stats ─────────────────────────────────────────────────
        document.getElementById('display-name').textContent = localStorage.getItem('playerName') || '???';
        document.getElementById('display-round').textContent = localStorage.getItem('lastRound') || '1';
        document.getElementById('display-score').textContent = localStorage.getItem('lastScore') || '0';
        document.getElementById('display-coins').textContent = localStorage.getItem('lastCoins') || '0';

        // ── Reveal content with fade in on load ───────────────────────────
        window.addEventListener('load', function () {
            var fadeOverlay = document.getElementById('fade-overlay');
            var content = document.getElementById('content');

            requestAnimationFrame(function () {
                fadeOverlay.classList.add('transparent');
            });

            setTimeout(function () {
                content.classList.add('visible');
            }, 150);
        });

        // ── Navigate with fade out ────────────────────────────────────────
        function navigateTo(url) {
            var fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('transparent');
            fadeOverlay.addEventListener('transitionend', function handler() {
                fadeOverlay.removeEventListener('transitionend', handler);
                window.location.href = url;
            });
        }

        // ── Play Again: keep player name, go to difficulty select ──────────
        function playAgain() {
            // Only clear run-specific data — keep playerName
            localStorage.removeItem('lastRound');
            localStorage.removeItem('lastScore');
            localStorage.removeItem('lastCoins');
            localStorage.removeItem('difficulty');
            navigateTo('menu.html?screen=difficulty');
        }

        // ── Title Screen: clear everything and go to title ─────────────────
        function goTitle() {
            localStorage.removeItem('playerName');
            localStorage.removeItem('lastRound');
            localStorage.removeItem('lastScore');
            localStorage.removeItem('lastCoins');
            localStorage.removeItem('difficulty');
            navigateTo('menu.html');
        }
    </script>

</body>

</html>
